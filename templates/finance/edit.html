{% extends "base.html" %}
{% block title %}Редактирование сделки{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">

        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4">

                <!-- HEADER -->
                <div class="d-flex align-items-center mb-4">
                    <div class="me-3 fs-3">
                        ✏️
                    </div>
                    <div>
                        <h4 class="mb-0">Редактирование сделки отдела продаж</h4>
                        <small class="text-muted">
                            Измените данные и сохраните
                        </small>
                    </div>
                </div>

                <form method="POST">

                    <!-- TYPE (READONLY) -->
                    <div class="mb-3">
                        <label class="form-label text-muted">
                            Тип движения
                        </label>
                        <input type="text"
                               class="form-control bg-light"
                               value="{{ 'Доход' if transaction.category.type == 'income' else 'Расход' }}"
                               disabled>
                    </div>

                    <!-- CATEGORY -->
                    <div class="mb-3">
                        <label class="form-label">
                            Статья (выручка/затраты отдела продаж АЦБК)
                        </label>
                        <select name="category_id"
                                class="form-select"
                                required>
                            {% for c in categories %}
                                <option value="{{ c.id }}"
                                    {% if c.id == transaction.category_id %}selected{% endif %}>
                                    {{ c.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- CLIENT -->
                    <div class="mb-3">
                        <label class="form-label">
                            Клиент (контрагент)
                        </label>
                        <input type="text"
                               name="client"
                               class="form-control"
                               value="{{ transaction.client or '' }}"
                               placeholder="Например: ООО «АрхБумага»">
                    </div>

                    <!-- PRODUCT -->
                    <div class="mb-3">
                        <label class="form-label">
                            Продукция
                        </label>
                        <input type="text"
                               name="product"
                               class="form-control"
                               value="{{ transaction.product or '' }}"
                               placeholder="Например: Бумага офисная А4, 80 г/м²">
                    </div>

                    <!-- REGION -->
                    <div class="mb-3">
                        <label class="form-label">
                            Регион поставки
                        </label>
                        <select name="region" class="form-select">
                            <option value="" {% if not transaction.region %}selected{% endif %}>Не указан</option>
                            <option value="Архангельск" {% if transaction.region == 'Архангельск' %}selected{% endif %}>Архангельск</option>
                            <option value="Северодвинск" {% if transaction.region == 'Северодвинск' %}selected{% endif %}>Северодвинск</option>
                            <option value="Новодвинск" {% if transaction.region == 'Новодвинск' %}selected{% endif %}>Новодвинск</option>
                            <option value="Коряжма" {% if transaction.region == 'Коряжма' %}selected{% endif %}>Коряжма</option>
                            <option value="Архангельская область (прочее)" {% if transaction.region == 'Архангельская область (прочее)' %}selected{% endif %}>Архангельская область (прочее)</option>
                            <option value="Россия (другие регионы)" {% if transaction.region == 'Россия (другие регионы)' %}selected{% endif %}>Россия (другие регионы)</option>
                            <option value="Экспорт" {% if transaction.region == 'Экспорт' %}selected{% endif %}>Экспорт</option>
                        </select>
                    </div>

                    <!-- VOLUME -->
                    <div class="mb-3">
                        <label class="form-label">
                            Объём, тонн
                        </label>
                        <input type="number"
                               name="volume_tons"
                               step="0.01"
                               class="form-control"
                               value="{{ transaction.volume_tons or '' }}">
                    </div>

                    <!-- CHANNEL -->
                    <div class="mb-3">
                        <label class="form-label">
                            Канал сбыта
                        </label>
                        <select name="channel" class="form-select">
                            <option value="" {% if not transaction.channel %}selected{% endif %}>Не указан</option>
                            <option value="Российский рынок" {% if transaction.channel == 'Российский рынок' %}selected{% endif %}>Российский рынок</option>
                            <option value="Экспорт" {% if transaction.channel == 'Экспорт' %}selected{% endif %}>Экспорт</option>
                            <option value="Крупный дистрибьютор" {% if transaction.channel == 'Крупный дистрибьютор' %}selected{% endif %}>Крупный дистрибьютор</option>
                            <option value="Прямой клиент" {% if transaction.channel == 'Прямой клиент' %}selected{% endif %}>Прямой клиент</option>
                            <option value="Госзакупка" {% if transaction.channel == 'Госзакупка' %}selected{% endif %}>Госзакупка</option>
                        </select>
                    </div>

                    <!-- AMOUNT -->
                    <div class="mb-3">
                        <label class="form-label">
                            Сумма, ₽
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">₽</span>
                            <input type="number"
                                   name="amount"
                                   class="form-control"
                                   step="0.01"
                                   value="{{ transaction.amount }}"
                                   required>
                        </div>
                    </div>

                    <!-- DATE -->
                    <div class="mb-3">
                        <label class="form-label">
                            Дата сделки
                        </label>
                        <input type="date"
                               name="date"
                               class="form-control"
                               value="{{ date_value }}">
                    </div>

                    <!-- COMMENT -->
                    <div class="mb-4">
                        <label class="form-label">
                            Примечание
                        </label>
                        <textarea name="comment"
                                  class="form-control"
                                  rows="2"
                                  placeholder="Необязательное примечание к сделке">{{ transaction.comment }}</textarea>
                    </div>

                    <!-- ACTIONS -->
                    <div class="d-flex gap-2">
                        <button type="submit"
                                class="btn btn-primary px-4">
                            <i class="bi bi-check-lg"></i>
                            Сохранить
                        </button>

                        <a href="{{ url_for('transactions') }}"
                           class="btn btn-outline-secondary px-4">
                            Отмена
                        </a>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>
{% endblock %}
