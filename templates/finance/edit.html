{% extends "base.html" %}
{% block title %}Редактирование операции{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">

        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4">

                <!-- HEADER -->
                <div class="d-flex align-items-center mb-4">
                    <div class="me-3 fs-3">
                        ✏️
                    </div>
                    <div>
                        <h4 class="mb-0">Редактирование операции</h4>
                        <small class="text-muted">
                            Измените данные и сохраните
                        </small>
                    </div>
                </div>

                <form method="POST">

                    <!-- TYPE (READONLY) -->
                    <div class="mb-3">
                        <label class="form-label text-muted">
                            Тип операции
                        </label>
                        <input type="text"
                               class="form-control bg-light"
                               value="{{ 'Доход' if transaction.category.type == 'income' else 'Расход' }}"
                               disabled>
                    </div>

                    <!-- CATEGORY -->
                    <div class="mb-3">
                        <label class="form-label">
                            Категория
                        </label>
                        <select name="category_id"
                                class="form-select"
                                required>
                            {% for c in categories %}
                                <option value="{{ c.id }}"
                                    {% if c.id == transaction.category_id %}selected{% endif %}>
                                    {{ c.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- AMOUNT -->
                    <div class="mb-3">
                        <label class="form-label">
                            Сумма
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">₽</span>
                            <input type="number"
                                   name="amount"
                                   class="form-control"
                                   step="0.01"
                                   value="{{ transaction.amount }}"
                                   required>
                        </div>
                    </div>

                    <!-- DATE -->
                    <div class="mb-3">
                        <label class="form-label">
                            Дата операции
                        </label>
                        <input type="date"
                               name="date"
                               class="form-control"
                               value="{{ date_value }}">
                    </div>

                    <!-- COMMENT -->
                    <div class="mb-4">
                        <label class="form-label">
                            Комментарий
                        </label>
                        <textarea name="comment"
                                  class="form-control"
                                  rows="2"
                                  placeholder="Например: обед, зарплата, такси">{{ transaction.comment }}</textarea>
                    </div>

                    <!-- ACTIONS -->
                    <div class="d-flex gap-2">
                        <button type="submit"
                                class="btn btn-primary px-4">
                            <i class="bi bi-check-lg"></i>
                            Сохранить
                        </button>

                        <a href="{{ url_for('transactions') }}"
                           class="btn btn-outline-secondary px-4">
                            Отмена
                        </a>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>
{% endblock %}
