{% extends "base.html" %}
{% block title %}Добавить операцию{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow-lg border-0">
            <div class="card-body p-4">

                <h3 class="mb-4 text-center">➕ Добавить операцию</h3>

                <form method="POST">

                    <!-- TYPE -->
                    <div class="mb-3">
                        <label class="form-label">Тип операции</label>
                        <select id="typeSelect" class="form-select" required>
                            <option value="">Выберите тип</option>
                            <option value="income">Доход</option>
                            <option value="expense">Расход</option>
                        </select>
                    </div>

                    <!-- CATEGORY -->
                    <div class="mb-3">
                        <label class="form-label">Категория</label>
                        <select name="category_id"
                                id="categorySelect"
                                class="form-select"
                                required>
                            <option value="">Сначала выберите тип</option>

                            {% for c in categories %}
                                <option value="{{ c.id }}"
                                        data-type="{{ c.type }}"
                                        style="display: none;">
                                    {{ c.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- AMOUNT -->
                    <div class="mb-3">
                        <label class="form-label">Сумма</label>
                        <input type="number"
                               step="0.01"
                               name="amount"
                               class="form-control"
                               required>
                    </div>

                    <!-- DATE -->
                    <div class="mb-3">
                        <label class="form-label">Дата операции</label>
                        <input type="date"
                               name="date"
                               class="form-control"
                               value="{{ today }}">

                    </div>

                    <!-- COMMENT -->
                    <div class="mb-3">
                        <label class="form-label">Комментарий</label>
                        <input type="text"
                               name="comment"
                               class="form-control"
                               placeholder="Необязательно">
                    </div>

                    <!-- BUTTON -->
                    <div class="d-grid">
                        <button class="btn btn-success btn-lg">
                            Сохранить
                        </button>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

<script>
const typeSelect = document.getElementById('typeSelect');
const categorySelect = document.getElementById('categorySelect');

typeSelect.addEventListener('change', () => {
    const selectedType = typeSelect.value;

    categorySelect.value = '';
    categorySelect.querySelectorAll('option').forEach(option => {
        if (!option.dataset.type) return;

        option.style.display =
            option.dataset.type === selectedType ? 'block' : 'none';
    });
});
</script>
{% endblock %}
