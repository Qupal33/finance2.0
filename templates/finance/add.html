{% extends "base.html" %}
{% block title %}Добавить сделку{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow-lg border-0">
            <div class="card-body p-4">

                <h3 class="mb-4 text-center">➕ Добавить сделку отдела продаж</h3>

                <form method="POST">

                    <!-- TYPE -->
                    <div class="mb-3">
                        <label class="form-label">Тип движения</label>
                        <select id="typeSelect" class="form-select" required>
                            <option value="">Выберите тип</option>
                            <option value="income">Выручка</option>
                            <option value="expense">Затраты</option>
                        </select>
                    </div>

                    <!-- CATEGORY -->
                    <div class="mb-3">
                        <label class="form-label">Статья (выручка/затраты отдела продаж АЦБК)</label>
                        <select name="category_id"
                                id="categorySelect"
                                class="form-select"
                                required>
                            <option value="">Сначала выберите тип</option>

                            {% for c in categories %}
                                <option value="{{ c.id }}"
                                        data-type="{{ c.type }}"
                                        style="display: none;">
                                    {{ c.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- CLIENT -->
                    <div class="mb-3">
                        <label class="form-label">Клиент (контрагент)</label>
                        <input type="text"
                               name="client"
                               class="form-control"
                               placeholder="Например: ООО «АрхБумага»">
                    </div>

                    <!-- PRODUCT -->
                    <div class="mb-3">
                        <label class="form-label">Продукция</label>
                        <input type="text"
                               name="product"
                               class="form-control"
                               placeholder="Например: Бумага офисная А4, 80 г/м²">
                    </div>

                    <!-- REGION -->
                    <div class="mb-3">
                        <label class="form-label">Регион поставки</label>
                        <select name="region" class="form-select">
                            <option value="">Не указан</option>
                            <option value="Архангельск">Архангельск</option>
                            <option value="Северодвинск">Северодвинск</option>
                            <option value="Новодвинск">Новодвинск</option>
                            <option value="Коряжма">Коряжма</option>
                            <option value="Архангельская область (прочее)">Архангельская область (прочее)</option>
                            <option value="Россия (другие регионы)">Россия (другие регионы)</option>
                            <option value="Экспорт">Экспорт</option>
                        </select>
                    </div>

                    <!-- VOLUME -->
                    <div class="mb-3">
                        <label class="form-label">Объём, тонн</label>
                        <input type="number"
                               step="0.01"
                               name="volume_tons"
                               class="form-control"
                               placeholder="Например: 10.5">
                    </div>

                    <!-- CHANNEL -->
                    <div class="mb-3">
                        <label class="form-label">Канал сбыта</label>
                        <select name="channel" class="form-select">
                            <option value="">Не указан</option>
                            <option value="Российский рынок">Российский рынок</option>
                            <option value="Экспорт">Экспорт</option>
                            <option value="Крупный дистрибьютор">Крупный дистрибьютор</option>
                            <option value="Прямой клиент">Прямой клиент</option>
                            <option value="Госзакупка">Госзакупка</option>
                        </select>
                    </div>

                    <!-- AMOUNT -->
                    <div class="mb-3">
                        <label class="form-label">Сумма, ₽</label>
                        <input type="number"
                               step="0.01"
                               name="amount"
                               class="form-control"
                               required>
                    </div>

                    <!-- DATE -->
                    <div class="mb-3">
                        <label class="form-label">Дата сделки</label>
                        <input type="date"
                               name="date"
                               class="form-control"
                               value="{{ today }}">

                    </div>

                    <!-- COMMENT -->
                    <div class="mb-3">
                        <label class="form-label">Примечание</label>
                        <input type="text"
                               name="comment"
                               class="form-control"
                               placeholder="Необязательное примечание к сделке">
                    </div>

                    <!-- BUTTON -->
                    <div class="d-grid">
                        <button class="btn btn-success btn-lg">
                            Сохранить
                        </button>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

<script>
const typeSelect = document.getElementById('typeSelect');
const categorySelect = document.getElementById('categorySelect');

typeSelect.addEventListener('change', () => {
    const selectedType = typeSelect.value;

    categorySelect.value = '';
    categorySelect.querySelectorAll('option').forEach(option => {
        if (!option.dataset.type) return;

        option.style.display =
            option.dataset.type === selectedType ? 'block' : 'none';
    });
});
</script>
{% endblock %}
